version: '3.8'
services:
  omnia-cli:
    build: .
    image: omnia/sdk:latest
    entrypoint: ["omnia"]
    command: ["--help"]

  omnia-server:
    build: .
    image: omnia/sdk:latest
    entrypoint: ["python3", "-m", "omnia.server"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
