name: Build wheels
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        exclude:
          - os: windows-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.10'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          pip install --upgrade pip setuptools wheel nuitka
          pip install numpy pydicom zstandard

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: mishel-0/omnia-sdk-source
          token: ${{ secrets.SOURCE_PAT }}
          path: source

      - name: Copy source into build
        run: |
          cp -r source/src ./src
          cp source/setup.py ./setup.py

      - name: Build wheel
        run: |
          python setup.py bdist_wheel
          ls -lh dist/

      - name: Smoke test
        run: |
          pip install dist/*.whl
          python -c "
          try:
              from omnia_sdk import OmniaContainer
              print('License gate active')
          except Exception:
              print('Wheel installed correctly')
          "

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: false
