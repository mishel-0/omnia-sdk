name: Build wheels
on:
  push:
    tags:
      - 'v*'

# Security: only run on tag pushes, not on PRs from forks
# No pull_request trigger — secrets never exposed to untrusted code

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        exclude:
          - os: windows-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.10'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          pip install --upgrade pip setuptools wheel nuitka
          pip install numpy pydicom zstandard

      - name: Checkout private source
        env:
          # Fine-grained PAT scoped to omnia-sdk-source only, Contents: read
          # Create at: https://github.com/settings/tokens?type=beta
          # Expires: 90 days
          PAT: ${{ secrets.SOURCE_PAT }}
        run: |
          git clone https://$PAT@github.com/mishel-0/omnia-sdk-source.git /tmp/source
          cp -r /tmp/source/src ./src
          cp /tmp/source/setup.py ./setup.py

      - name: Build wheel with Nuitka
        run: |
          python setup.py bdist_wheel
          echo "Built:"
          ls -lh dist/

      - name: Smoke test wheel
        run: |
          pip install dist/*.whl
          python -c "
          try:
              from omnia_sdk import OmniaContainer
              print('License gate: blocked (expected)')
          except Exception:
              print('Wheel installed, license gate active')
          "

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: false
